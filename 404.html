<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS Websites</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; }
        iframe { border: none; width: 100%; height: 100%; }
        .message { text-align: center; margin-top: 20%; font-family: sans-serif; padding: 20px; }
    </style>
</head>
<body>
    <iframe id="display" src="" style="display:none; width:100%; height:100%; border:none;"></iframe>
    <div id="status" class="message">Loading RS System...</div>

    <script>
        async function startSystem() {
            const statusDiv = document.getElementById('status');
            const iframe = document.getElementById('display');

            try {
                // Database file fetch karna
                const response = await fetch('database.json');
                const mySites = await response.json();

                // URL se path nikalna
                let path = window.location.pathname.split("/").pop().replace(".", "_");

                // AGAR URL KHALI HAI (Blank Path)
                if (!path || path === "" || path === "domain") { 
                    statusDiv.style.display = 'none';
                    iframe.style.display = 'block';
                    iframe.src = "https://rehansandhi.netlify.app"; // Default site
                } 
                // AGAR DATABASE MEIN LINK HAI
                else if (mySites[path]) {
                    statusDiv.style.display = 'none';
                    iframe.style.display = 'block';
                    iframe.src = mySites[path];
                } 
                // AGAR LINK NAHI MILA
                else {
                    statusDiv.innerHTML = "<h1>Error 404 : Link not found! Please Check Your Link. Thanks for Visiting our Site 😊</h1>";
                }
            } catch (error) {
                // Error handle karna (Agar file na mile)
                statusDiv.innerHTML = "<h1>System Error: Database not found!</h1>";
            }
        }

        startSystem();
    </script>
</body>
</html>
